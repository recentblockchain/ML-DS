{`import torch
import torch.nn as nn
import torch.nn.functional as F

class SimpleNN(nn.Module):
    def __init__(self, input_size, hidden_size, output_size):
        super(SimpleNN, self).__init__()
        self.fc1 = nn.Linear(input_size, hidden_size)
        self.fc2 = nn.Linear(hidden_size, hidden_size)
        self.fc3 = nn.Linear(hidden_size, output_size)
    
    def forward(self, x):
        x = F.relu(self.fc1(x))
        x = F.relu(self.fc2(x))
        x = self.fc3(x)
        return x

# Create model
model = SimpleNN(input_size=10, hidden_size=20, output_size=1)
print(model)

# Example input
x = torch.randn(1, 10)
output = model(x)
print(f"Output: {output}")`}

import torch.nn as nn

class LSTMModel(nn.Module):
    def __init__(self, input_size, hidden_size, num_layers, output_size):
        super(LSTMModel, self).__init__()
        self.hidden_size = hidden_size
        self.num_layers = num_layers
        
        # LSTM layer
        self.lstm = nn.LSTM(input_size, hidden_size, num_layers, 
                           batch_first=True, dropout=0.2)
        
        # Output layer
        self.fc = nn.Linear(hidden_size, output_size)
    
    def forward(self, x):
        # Initialize hidden and cell states
        h0 = torch.zeros(self.num_layers, x.size(0), 
                        self.hidden_size).to(x.device)
        c0 = torch.zeros(self.num_layers, x.size(0), 
                        self.hidden_size).to(x.device)
        
        # Forward propagate LSTM
        out, _ = self.lstm(x, (h0, c0))
        
        # Get output from last time step
        out = self.fc(out[:, -1, :])
        return out

# Create model
model = LSTMModel(input_size=40, hidden_size=128, 
                 num_layers=2, output_size=10)

import torch.nn as nn
import torchaudio

class SpeechLSTM(nn.Module):
    def __init__(self, input_dim=40, hidden_dim=256, 
                 num_layers=3, num_classes=29):
        super(SpeechLSTM, self).__init__()
        
        self.lstm = nn.LSTM(input_dim, hidden_dim, num_layers,
                           batch_first=True, bidirectional=True,
                           dropout=0.3)
        
        self.fc = nn.Linear(hidden_dim * 2, num_classes)
        
    def forward(self, x):
        out, _ = self.lstm(x)
        out = self.fc(out)
        return out

# Feature extraction
def extract_features(audio_path):
    waveform, sr = torchaudio.load(audio_path)
    
    # Compute MFCC features
    mfcc = torchaudio.transforms.MFCC(
        sample_rate=sr,
        n_mfcc=40,
        melkwargs={'n_fft': 400, 'hop_length': 160}
    )(waveform)
    
    return mfcc.transpose(1, 2)  # [batch, time, features]

# Create model
model = SpeechLSTM()
features = extract_features('speech.wav')
output = model(features)
print(f"Output shape: {output.shape}")  # [batch, time, classes]`}

{`import torch
import torch.nn as nn

class MusicLSTM(nn.Module):
    def __init__(self, vocab_size, embedding_dim=128, 
                 hidden_dim=256, num_layers=2):
        super(MusicLSTM, self).__init__()
        
        self.embedding = nn.Embedding(vocab_size, embedding_dim)
        self.lstm = nn.LSTM(embedding_dim, hidden_dim, 
                           num_layers, dropout=0.3)
        self.fc = nn.Linear(hidden_dim, vocab_size)
        
    def forward(self, x, hidden=None):
        x = self.embedding(x)
        out, hidden = self.lstm(x, hidden)
        out = self.fc(out)
        return out, hidden

# Generate music
def generate_music(model, start_seq, length=100, temperature=1.0):
    model.eval()
    generated = list(start_seq)
    hidden = None
    
    with torch.no_grad():
        for _ in range(length):
            x = torch.tensor([generated[-1]]).unsqueeze(0)
            output, hidden = model(x, hidden)
            
            # Apply temperature
            output = output.squeeze() / temperature
            probs = torch.softmax(output, dim=0)
            
            # Sample next note
            next_note = torch.multinomial(probs, 1).item()
            generated.append(next_note)
    
    return generated

# Example usage
model = MusicLSTM(vocab_size=128)  # 128 MIDI notes
melody = generate_music(model, [60, 62, 64], length=50)
print(f"Generated melody: {melody[:20]}...")`}
