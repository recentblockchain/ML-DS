<!DOCTYPE html>
<html>

<head>
    <title>React Environment Test</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>

<body
    style="background: #070b17; color: white; display: flex; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif;">
    <div id="root">
        <h2 style="color: #f72585;">Waiting for React...</h2>
        <p>If this text doesn't change to "React is working!", please check your internet connection.</p>
    </div>
    <script type="text/babel">
        function Test() {
            return (
                <div style={{ textAlign: 'center' }}>
                    <h1 style={{ color: '#00f5d4' }}>✓ React is working!</h1>
                    <p>Your browser is successfully loading React and Babel.</p>
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Test />);
    </script>
</body>

</html>
