                <p className="text-gray-600 mb-6">Different formats for encoding audio in machine learning models</p>

                <div className="space-y-4">
                  {representations.map((rep, idx) => (
                    <div key={idx} className="border-2 border-gray-200 rounded-xl p-6 hover:border-indigo-300 transition-all">
                      <div className="flex items-start justify-between mb-4">
                        <div className="flex-1">
                          <h3 className="text-xl font-bold text-gray-900">{rep.name}</h3>
                          <p className="text-gray-600 text-sm mt-1">{rep.description}</p>
                        </div>
                        <div className="text-right ml-4">
                          <div className="text-sm font-semibold text-indigo-600">{rep.rate}</div>
                          <div className="text-xs text-gray-500">{rep.dim}</div>
                        </div>
                      </div>

                      <div className="grid grid-cols-3 gap-3">
                        <div className="bg-green-50 p-3 rounded-lg">
                          <div className="text-xs font-semibold text-green-700 mb-1">Advantages</div>
                          <div className="text-sm text-gray-700">{rep.pros}</div>
                        </div>
                        <div className="bg-orange-50 p-3 rounded-lg">
                          <div className="text-xs font-semibold text-orange-700 mb-1">Limitations</div>
                          <div className="text-sm text-gray-700">{rep.cons}</div>
                        </div>
                        <div className="bg-indigo-50 p-3 rounded-lg">
                          <div className="text-xs font-semibold text-indigo-700 mb-1">Used In</div>
                          <div className="text-sm text-gray-700">{rep.models}</div>
                        </div>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {activeTab === 'training' && (
              <div className="bg-white rounded-2xl shadow-xl p-8">
                <h2 className="text-3xl font-bold text-gray-900 mb-6">Training Techniques</h2>
                <p className="text-gray-600 mb-6">Advanced methods for training generative audio models</p>

                <div className="grid grid-cols-2 gap-6">
                  {trainingTechniques.map((tech, idx) => (
                    <div key={idx} className="bg-gradient-to-br from-gray-50 to-indigo-50 p-6 rounded-xl border-2 border-gray-200">
                      <h3 className="text-xl font-bold text-gray-900 mb-3">{tech.name}</h3>
                      <p className="text-gray-700 mb-4">{tech.description}</p>
                      
                      <div className="space-y-3">
                        <div className="bg-white p-3 rounded-lg">
                          <div className="text-sm font-semibold text-indigo-700 mb-1">Implementation</div>
                          <div className="text-gray-600 text-sm">{tech.implementation}</div>
                        </div>
                        <div className="bg-green-50 p-3 rounded-lg border border-green-200">
                          <div className="text-sm font-semibold text-green-700 mb-1">Benefit</div>
                          <div className="text-gray-700 text-sm">{tech.benefit}</div>
                        </div>
                      </div>
                    </div>
                  ))}
                </div>

                <div className="mt-8 bg-gradient-to-r from-yellow-50 to-orange-50 p-6 rounded-xl border-2 border-yellow-300">
                  <h4 className="font-bold text-gray-900 mb-4">Optimization Strategies</h4>
                  <div className="grid grid-cols-3 gap-4 text-sm">
                    <div>
                      <p className="font-semibold text-gray-800 mb-2">Mixed Precision</p>
                      <p className="text-gray-600">FP16 for speed, FP32 for stability. 2-3x faster training.</p>
                    </div>
                    <div>
                      <p className="font-semibold text-gray-800 mb-2">Gradient Accumulation</p>
                      <p className="text-gray-600">Larger effective batch sizes on limited memory.</p>
                    </div>
                    <div>
                      <p className="font-semibold text-gray-800 mb-2">Distributed Training</p>
                      <p className="text-gray-600">Data/model parallelism across multiple GPUs.</p>
                    </div>
                  </div>
                </div>
              </div>
            )}

            <div className="mt-6 bg-white rounded-xl shadow-lg p-6 text-center">
              <p className="text-gray-700 font-semibold">Technical Reference for Generative AI Audio Systems</p>
              <p className="text-gray-500 text-sm mt-2">Architectural patterns and implementation details</p>
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<GenerativeAIAudio />);
  </script>
</body>
</html>
