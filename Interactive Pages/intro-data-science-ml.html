<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState } = React;

        { step: 1, title: "Problem Definition", description: "Understand the business problem and define objectives", icon: "\u{1F3AF}", activities: ["Stakeholder interviews", "Define success metrics", "Identify constraints"], example: "Predict customer churn to reduce attrition by 15%" },

        { step: 3, title: "Data Cleaning & Preparation", description: "Clean, transform, and prepare data for analysis", icon: "\u26A1", activities: ["Handle missing values", "Remove duplicates", "Feature engineering"], example: "Remove incomplete records, normalize scales, create engagement scores" },
        { step: 4, title: "Exploratory Data Analysis", description: "Understand patterns, distributions, and relationships", icon: "\u{1F4CA}", activities: ["Statistical summaries", "Visualizations", "Correlation analysis"], example: "Discover that 70% of churners had no activity in last 30 days" },
        { step: 5, title: "Model Building", description: "Select and train machine learning models", icon: "\u{1F9E0}", activities: ["Algorithm selection", "Feature selection", "Model training"], example: "Train Random Forest, XGBoost, and Logistic Regression models" },
        { step: 6, title: "Model Evaluation", description: "Assess model performance and validate results", icon: "\u2705", activities: ["Cross-validation", "Performance metrics", "Bias detection"], example: "Achieve 87% accuracy, 0.82 F1-score on validation set" },
        { step: 7, title: "Deployment & Monitoring", description: "Deploy model to production and monitor performance", icon: "\u{1F4C8}", activities: ["Model deployment", "A/B testing", "Performance monitoring"], example: "Deploy API endpoint, monitor predictions, retrain quarterly" }
      ];

      const conceptComparison = [
        { concept: "Artificial Intelligence (AI)", definition: "Broad field focused on creating intelligent machines that can simulate human thinking", scope: "Broadest - encompasses all intelligent systems", examples: ["Expert systems", "Natural language processing", "Computer vision", "Robotics"], goal: "Mimic human intelligence and decision-making" },
        { concept: "Machine Learning (ML)", definition: "Subset of AI that learns patterns from data without explicit programming", scope: "Medium - specific approach within AI", examples: ["Classification models", "Regression models", "Clustering", "Neural networks"], goal: "Learn from data to make predictions or decisions" },
        { concept: "Statistics", definition: "Mathematical discipline for collecting, analyzing, and interpreting data", scope: "Focused - mathematical foundation for ML", examples: ["Hypothesis testing", "Confidence intervals", "Probability distributions", "Regression analysis"], goal: "Make inferences about populations from samples" }
      ];

      const learningTypes = [
        {
          type: "Supervised Learning", description: "Learning from labeled data (input-output pairs)", icon: "\u{1F4CA}",
          characteristics: ["Requires labeled training data", "Goal: Predict output for new inputs", "Has ground truth for evaluation"],
          subtypes: [
            { name: "Classification", task: "Predict discrete categories", examples: ["Email spam detection", "Disease diagnosis", "Image recognition"] },
            { name: "Regression", task: "Predict continuous values", examples: ["House price prediction", "Stock forecasting", "Temperature prediction"] }
          ],
          algorithms: ["Linear Regression", "Logistic Regression", "Decision Trees", "Random Forest", "SVM", "Neural Networks"]
        },
        {
          type: "Unsupervised Learning", description: "Finding patterns in unlabeled data", icon: "\u{1F50D}",

            { name: "Dimensionality Reduction", task: "Reduce feature space", examples: ["Data visualization", "Feature extraction", "Noise reduction"] }

      const mlFailures = [
        { id: 1, title: "Amazon's Biased Hiring AI (2018)", company: "Amazon", domain: "HR/Recruitment", problem: "AI recruiting tool showed bias against women", details: "Amazon's experimental hiring algorithm penalized resumes that included the word 'women's' or came from all-women's colleges. The model was trained on 10 years of resumes submitted to Amazon, predominantly from men.", rootCause: "Historical bias in training data - tech industry gender imbalance was learned by the model", impact: "Project scrapped; reputational damage; highlighted AI bias concerns", lessons: ["Training data reflects historical biases", "Need diverse, representative datasets", "Importance of fairness auditing", "Human oversight is critical"] },
        { id: 2, title: "Healthcare Algorithm Racial Bias (2019)", company: "Major US Healthcare System", domain: "Healthcare", problem: "Algorithm showed racial bias in care allocation", details: "Algorithm used to identify patients needing extra medical care systematically discriminated against Black patients. At any given risk score, Black patients were considerably sicker than White patients.", rootCause: "Used healthcare costs as proxy for health needs - Black patients had lower access to care, thus lower costs despite similar health conditions", impact: "Affected millions of patients; reduced Black patient identification by >50%", lessons: ["Be careful with proxy variables", "Understand social/systemic factors", "Test for disparate impact", "Consider historical inequities"] },
        { id: 3, title: "Knight Capital Trading Disaster (2012)", company: "Knight Capital Group", domain: "Finance/Trading", problem: "Algorithmic trading software malfunction", details: "Deployment error caused trading algorithm to execute millions of erroneous trades in 45 minutes. The algorithm bought high and sold low repeatedly.", rootCause: "Incomplete software deployment - old code remained on one server, causing conflicting trading logic", impact: "$440 million loss in 45 minutes; company nearly bankrupted", lessons: ["Rigorous deployment procedures", "Kill switches and circuit breakers", "Testing in production-like environments", "Monitoring and anomaly detection"] },
        { id: 4, title: "Tesla Autopilot Fatal Crashes", company: "Tesla", domain: "Autonomous Vehicles", problem: "Multiple fatal accidents involving Autopilot feature", details: "Several crashes where Tesla vehicles on Autopilot failed to detect obstacles (trucks, barriers, stopped vehicles), resulting in fatal collisions.", rootCause: "Over-reliance on camera vision; edge cases not covered in training; driver misunderstanding of capabilities", impact: "Multiple fatalities; regulatory investigations; lawsuits", lessons: ["Safety-critical systems need redundancy", "Clear communication of limitations", "Extensive edge case testing", "Human-in-the-loop for critical decisions"] },
        { id: 5, title: "IBM Watson for Oncology Issues (2018)", company: "IBM", domain: "Healthcare/Oncology", problem: "AI system provided unsafe and incorrect treatment recommendations", details: "Watson for Oncology recommended treatments that were sometimes 'unsafe and incorrect,' including suggestions that could lead to severe bleeding or death in cancer patients.", rootCause: "Trained on synthetic cases and small datasets from single hospital; insufficient real-world validation", impact: "Partnerships terminated; millions in losses; questioned AI in healthcare", lessons: ["Real-world validation is essential", "Medical AI needs extensive clinical trials", "Diverse training data sources required", "Physician expertise cannot be replaced blindly"] },

      ];

      const pythonEcosystem = {
        dataManipulation: [
          { name: "NumPy", purpose: "Numerical computing, array operations", use: "Foundation for numerical operations" },
          { name: "Pandas", purpose: "Data manipulation and analysis", use: "DataFrames, data cleaning, preprocessing" },
          { name: "Polars", purpose: "Fast DataFrame library", use: "Large-scale data processing" }

          { name: "OpenCV", purpose: "Computer vision", use: "Image processing, video analysis" },
          { name: "Statsmodels", purpose: "Statistical modeling", use: "Statistical tests, time series" }
        ]
      };

      const quizQuestions = [
        { id: 'q1', question: "Which comes first in the data science lifecycle?", options: ["Data Collection", "Problem Definition", "Model Building", "EDA"], correct: "Problem Definition" },
        { id: 'q2', question: "What is the key difference between ML and traditional statistics?", options: ["ML focuses on prediction, statistics on inference", "Statistics is newer than ML", "ML doesn't use mathematics", "They are exactly the same"], correct: "ML focuses on prediction, statistics on inference" },
        { id: 'q3', question: "Email spam detection is an example of:", options: ["Supervised Classification", "Unsupervised Clustering", "Reinforcement Learning", "Dimensionality Reduction"], correct: "Supervised Classification" },
        { id: 'q4', question: "What was the main cause of Amazon's biased hiring AI?", options: ["Poor coding practices", "Historical bias in training data", "Insufficient computing power", "Wrong algorithm selection"], correct: "Historical bias in training data" },
        { id: 'q5', question: "Which library is best for classical ML algorithms in Python?", options: ["TensorFlow", "Scikit-learn", "Matplotlib", "NumPy"], correct: "Scikit-learn" }
      ];

      const handleQuizAnswer = (questionId, answer) => {
        setQuizAnswers({ ...quizAnswers, [questionId]: answer });
      };

      const submitQuiz = () => { setShowQuizResults(true); };

      const getQuizScore = () => {
        let correct = 0;
        quizQuestions.forEach(q => { if (quizAnswers[q.id] === q.correct) correct++; });
        return correct;
      };

        <div className="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-50 p-4 md:p-8">
          <div className="max-w-7xl mx-auto">

            {/* Header */}
            <div className="bg-white rounded-2xl shadow-xl p-6 md:p-8 mb-8">
              <div className="flex items-center gap-4 mb-4">
                <div className="bg-gradient-to-br from-blue-500 to-indigo-600 p-4 rounded-xl">
                  <span style={{fontSize:'2.5rem'}}>{'\u{1F9E0}'}</span>
                </div>
                <div>
                  <h1 className="text-3xl md:text-4xl font-bold text-gray-900">Introduction to Data Science &amp; Machine Learning</h1>
                  <p className="text-gray-600 mt-2">A comprehensive guide to understanding the fundamentals of DS and ML</p>
                </div>
              </div>
            </div>

            {/* Navigation Tabs */}
            <div className="bg-white rounded-xl shadow-lg p-2 mb-8">
              <div className="flex gap-2 flex-wrap">

                  { id: 'failures', label: 'ML Failures', icon: '\u26A0\uFE0F' },
                  { id: 'ecosystem', label: 'Python Ecosystem', icon: '\u{1F4BB}' },
                  { id: 'quiz', label: 'Knowledge Check', icon: '\u2705' }

                    className={'flex items-center gap-2 px-4 md:px-6 py-3 rounded-lg font-medium transition-all ' + (
                      activeTab === tab.id
                        ? 'bg-gradient-to-r from-blue-500 to-indigo-600 text-white shadow-lg'
                        : 'bg-gray-100 text-gray-700 hover:bg-gray-200'
                    )}
                  >
                    <span>{tab.icon}</span>
                    <span className="text-sm md:text-base">{tab.label}</span>
                  </button>
                ))}
              </div>

            {/* ==================== DATA SCIENCE LIFECYCLE TAB ==================== */}

                    <span>{'\u{1F500}'}</span> Data Science Lifecycle
                  </h2>

                  <div className="mb-8">
                    <div className="flex items-center justify-between mb-4">
                      <button onClick={() => setLifecycleStep(Math.max(0, lifecycleStep - 1))} disabled={lifecycleStep === 0} className="px-4 py-2 bg-blue-500 text-white rounded-lg disabled:bg-gray-300 disabled:cursor-not-allowed">Previous</button>
                      <span className="text-gray-600 font-medium">Step {lifecycleStep + 1} of {lifecycleSteps.length}</span>

                  <span>{'\u{1F4D6}'}</span> ML vs AI vs Statistics: Understanding the Differences

                    <div className="flex items-start gap-3">
                      <span className="text-yellow-600 mt-1">{'\u25B6'}</span>
                      <p className="text-gray-700"><strong>AI vs ML:</strong> AI includes rule-based systems and symbolic reasoning, while ML specifically learns patterns from data.</p>

                    <div className="flex items-start gap-3">
                      <span className="text-yellow-600 mt-1">{'\u25B6'}</span>
                      <p className="text-gray-700"><strong>Overlap:</strong> Many ML algorithms are built on statistical foundations, and ML is the dominant approach in modern AI systems.</p>
                    </div>
                  </div>
                </div>
              </div>

                        <p className="text-gray-600 text-lg">{type.description}</p>
                      </div>
                    </div>

                    <div className="bg-gradient-to-r from-blue-50 to-indigo-50 rounded-lg p-6 mb-6">

                          <div key={i} className="flex items-start gap-2">

                            </div>

                      ))}

                    <div>
                      <h3 className="font-bold text-gray-900 mb-3">Common Algorithms:</h3>
                      <div className="flex flex-wrap gap-2">

            {activeTab === 'failures' && (
              <div className="space-y-6">
                <div className="bg-white rounded-xl shadow-lg p-6 md:p-8">
                  <h2 className="text-2xl md:text-3xl font-bold text-gray-900 mb-4 flex items-center gap-3">
                    <span>{'\u26A0\uFE0F'}</span> Real-world ML Failures: Learning from Mistakes
                  </h2>
                  <p className="text-gray-600 mb-6">Understanding failures is crucial for building robust ML systems. These case studies highlight common pitfalls and important lessons.</p>

                  <div className="grid md:grid-cols-2 lg:grid-cols-3 gap-4 mb-8">
                    {mlFailures.map(failure => (
                      <div key={failure.id} onClick={() => setSelectedFailure(failure.id)}
                        className={'p-5 rounded-lg border-2 cursor-pointer transition-all ' + (
                          selectedFailure === failure.id ? 'border-red-500 bg-red-50' : 'border-gray-200 bg-white hover:border-red-300'
                        )}>
                        <div className="flex items-start justify-between mb-3">
                          <h3 className="font-bold text-gray-900 text-sm">{failure.title}</h3>
                          <span className={selectedFailure === failure.id ? 'text-red-600' : 'text-gray-400'}>{'\u26A0\uFE0F'}</span>
                        </div>
                        <div className="space-y-2 text-xs">
                          <div className="flex items-center gap-2"><span className="font-semibold text-gray-700">Company:</span><span className="text-gray-600">{failure.company}</span></div>
                          <div className="flex items-center gap-2"><span className="font-semibold text-gray-700">Domain:</span><span className="bg-gray-100 px-2 py-1 rounded text-gray-600">{failure.domain}</span></div>
                        </div>
                      </div>
                    ))}
                  </div>

                  {selectedFailure && (() => {
                    const failure = mlFailures.find(f => f.id === selectedFailure);
                    return (
                      <div className="bg-gradient-to-br from-red-50 to-orange-50 rounded-xl p-6 md:p-8 border-2 border-red-200">
                        <h3 className="text-2xl font-bold text-gray-900 mb-4">{failure.title}</h3>
                        <div className="grid md:grid-cols-2 gap-6 mb-6">
                          <div className="space-y-4">
                            <div className="bg-white rounded-lg p-4"><h4 className="font-bold text-gray-900 mb-2">{'\u{1F6A8}'} The Problem</h4><p className="text-gray-700">{failure.problem}</p></div>
                            <div className="bg-white rounded-lg p-4"><h4 className="font-bold text-gray-900 mb-2">{'\u{1F4CB}'} Details</h4><p className="text-gray-700">{failure.details}</p></div>
                          </div>
                          <div className="space-y-4">
                            <div className="bg-white rounded-lg p-4"><h4 className="font-bold text-gray-900 mb-2">{'\u{1F50D}'} Root Cause</h4><p className="text-gray-700">{failure.rootCause}</p></div>
                            <div className="bg-white rounded-lg p-4"><h4 className="font-bold text-gray-900 mb-2">{'\u{1F4A5}'} Impact</h4><p className="text-gray-700">{failure.impact}</p></div>
                          </div>
                        </div>
                        <div className="bg-white rounded-lg p-6">
                          <h4 className="font-bold text-gray-900 mb-4 flex items-center gap-2"><span className="text-green-600">{'\u2705'}</span> Key Lessons Learned</h4>
                          <div className="grid md:grid-cols-2 gap-3">
                            {failure.lessons.map((lesson, idx) => (
                              <div key={idx} className="flex items-start gap-2">
                                <span className="text-green-600 mt-0.5">{'\u25B6'}</span><span className="text-gray-700">{lesson}</span>
                              </div>
                            ))}
                          </div>
                        </div>
                      </div>
                    );
                  })()}
                </div>

                {/* Common Themes */}
                <div className="bg-white rounded-xl shadow-lg p-6 md:p-8">
                  <h3 className="text-2xl font-bold text-gray-900 mb-6">Common Themes Across Failures</h3>
                  <div className="grid md:grid-cols-2 gap-6">
                    <div className="bg-red-50 border-2 border-red-200 rounded-lg p-6">
                      <h4 className="font-bold text-red-900 mb-3">Data-Related Issues</h4>
                      <ul className="space-y-2 text-gray-700">
                        <li>{'\u2022'} Historical bias in training data</li>
                        <li>{'\u2022'} Insufficient or unrepresentative datasets</li>
                        <li>{'\u2022'} Poor choice of proxy variables</li>
                        <li>{'\u2022'} Lack of diverse data sources</li>
                      </ul>
                    </div>
                    <div className="bg-orange-50 border-2 border-orange-200 rounded-lg p-6">
                      <h4 className="font-bold text-orange-900 mb-3">Process &amp; Governance</h4>
                      <ul className="space-y-2 text-gray-700">
                        <li>{'\u2022'} Inadequate testing and validation</li>
                        <li>{'\u2022'} Missing safety mechanisms</li>
                        <li>{'\u2022'} Poor deployment procedures</li>
                        <li>{'\u2022'} Lack of human oversight</li>
                      </ul>
                    </div>
                    <div className="bg-yellow-50 border-2 border-yellow-200 rounded-lg p-6">
                      <h4 className="font-bold text-yellow-900 mb-3">Technical Limitations</h4>
                      <ul className="space-y-2 text-gray-700">
                        <li>{'\u2022'} Edge cases not covered</li>
                        <li>{'\u2022'} Overconfidence in model capabilities</li>
                        <li>{'\u2022'} Lack of robustness to adversarial attacks</li>
                        <li>{'\u2022'} Insufficient monitoring systems</li>
                      </ul>
                    </div>
                    <div className="bg-purple-50 border-2 border-purple-200 rounded-lg p-6">
                      <h4 className="font-bold text-purple-900 mb-3">Communication Issues</h4>
                      <ul className="space-y-2 text-gray-700">
                        <li>{'\u2022'} Unclear capability limitations</li>
                        <li>{'\u2022'} Misaligned stakeholder expectations</li>
                        <li>{'\u2022'} Poor user education</li>
                        <li>{'\u2022'} Overpromising capabilities</li>
                      </ul>
                    </div>
                  </div>
                </div>
              </div>
            )}

            {/* ==================== PYTHON ECOSYSTEM TAB ==================== */}
            {activeTab === 'ecosystem' && (
              <div className="bg-white rounded-xl shadow-lg p-6 md:p-8">
                <h2 className="text-2xl md:text-3xl font-bold text-gray-900 mb-6 flex items-center gap-3">
                  <span>{'\u{1F4BB}'}</span> Python Machine Learning Ecosystem
                </h2>
                <p className="text-gray-600 mb-8">Python has become the de facto language for data science and machine learning, with a rich ecosystem of powerful libraries.</p>

                <div className="space-y-8">
                  {/* Data Manipulation */}
                  <div>
                    <h3 className="text-2xl font-bold text-gray-900 mb-4 flex items-center gap-2">
                      <span>{'\u{1F5C4}\uFE0F'}</span> Data Manipulation &amp; Analysis
                    </h3>
                    <div className="grid md:grid-cols-3 gap-4">
                      {pythonEcosystem.dataManipulation.map((lib, idx) => (
                        <div key={idx} className="border-2 border-blue-200 rounded-lg p-5 bg-blue-50">
                          <h4 className="text-xl font-bold text-gray-900 mb-2">{lib.name}</h4>
                          <p className="text-sm text-gray-600 mb-2"><strong>Purpose:</strong> {lib.purpose}</p>
                          <p className="text-sm text-gray-700"><strong>Use case:</strong> {lib.use}</p>
                        </div>
                      ))}
                    </div>
                  </div>

                  {/* Visualization */}
                  <div>
                    <h3 className="text-2xl font-bold text-gray-900 mb-4 flex items-center gap-2">
                      <span>{'\u{1F4CA}'}</span> Data Visualization
                    </h3>
                    <div className="grid md:grid-cols-3 gap-4">
                      {pythonEcosystem.visualization.map((lib, idx) => (
                        <div key={idx} className="border-2 border-green-200 rounded-lg p-5 bg-green-50">
                          <h4 className="text-xl font-bold text-gray-900 mb-2">{lib.name}</h4>
                          <p className="text-sm text-gray-600 mb-2"><strong>Purpose:</strong> {lib.purpose}</p>
                          <p className="text-sm text-gray-700"><strong>Use case:</strong> {lib.use}</p>
                        </div>
                      ))}
                    </div>
                  </div>

                  {/* ML Frameworks */}
                  <div>
                    <h3 className="text-2xl font-bold text-gray-900 mb-4 flex items-center gap-2">
                      <span>{'\u{1F9E0}'}</span> Classical ML Frameworks
                    </h3>
                    <div className="grid md:grid-cols-3 gap-4">
                      {pythonEcosystem.mlFrameworks.map((lib, idx) => (
                        <div key={idx} className="border-2 border-purple-200 rounded-lg p-5 bg-purple-50">
                          <h4 className="text-xl font-bold text-gray-900 mb-2">{lib.name}</h4>
                          <p className="text-sm text-gray-600 mb-2"><strong>Purpose:</strong> {lib.purpose}</p>
                          <p className="text-sm text-gray-700"><strong>Use case:</strong> {lib.use}</p>
                        </div>
                      ))}
                    </div>
                  </div>

                  {/* Deep Learning */}
                  <div>
                    <h3 className="text-2xl font-bold text-gray-900 mb-4 flex items-center gap-2">
                      <span>{'\u26A1'}</span> Deep Learning Frameworks
                    </h3>
                    <div className="grid md:grid-cols-3 gap-4">
                      {pythonEcosystem.deepLearning.map((lib, idx) => (
                        <div key={idx} className="border-2 border-orange-200 rounded-lg p-5 bg-orange-50">
                          <h4 className="text-xl font-bold text-gray-900 mb-2">{lib.name}</h4>
                          <p className="text-sm text-gray-600 mb-2"><strong>Purpose:</strong> {lib.purpose}</p>
                          <p className="text-sm text-gray-700"><strong>Use case:</strong> {lib.use}</p>
                        </div>
                      ))}
                    </div>
                  </div>

                  {/* Specialized */}
                  <div>
                    <h3 className="text-2xl font-bold text-gray-900 mb-4 flex items-center gap-2">
                      <span>{'\u{1F3AF}'}</span> Specialized Libraries
                    </h3>
                    <div className="grid md:grid-cols-2 gap-4">
                      {pythonEcosystem.specialized.map((lib, idx) => (
                        <div key={idx} className="border-2 border-red-200 rounded-lg p-5 bg-red-50">
                          <h4 className="text-xl font-bold text-gray-900 mb-2">{lib.name}</h4>
                          <p className="text-sm text-gray-600 mb-2"><strong>Purpose:</strong> {lib.purpose}</p>
                          <p className="text-sm text-gray-700"><strong>Use case:</strong> {lib.use}</p>
                        </div>
                      ))}
                    </div>
                  </div>
                </div>

                {/* Typical ML Project Stack */}
                <div className="mt-8 bg-gradient-to-br from-indigo-50 to-purple-50 border-2 border-indigo-200 rounded-xl p-6">
                  <h3 className="text-xl font-bold text-gray-900 mb-4">Typical ML Project Stack</h3>
                  <div className="space-y-3">
                    {[
                      { step: 1, text: 'Data Loading: Pandas, NumPy' },
                      { step: 2, text: 'EDA & Visualization: Matplotlib, Seaborn, Plotly' },
                      { step: 3, text: 'Preprocessing: Scikit-learn (preprocessing, feature engineering)' },
                      { step: 4, text: 'Model Training: Scikit-learn, XGBoost, or TensorFlow/PyTorch' },
                      { step: 5, text: 'Evaluation: Scikit-learn metrics' },
                      { step: 6, text: 'Deployment: Flask/FastAPI, Docker' }
                    ].map((item) => (
                      <div key={item.step} className="flex items-center gap-3">
                        <span className="bg-indigo-500 text-white px-3 py-1 rounded font-semibold text-sm">{'Step ' + item.step}</span>
                        <span className="text-gray-700">{item.text}</span>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            )}

            {/* ==================== QUIZ TAB ==================== */}
            {activeTab === 'quiz' && (
              <div className="bg-white rounded-xl shadow-lg p-6 md:p-8">
                <h2 className="text-2xl md:text-3xl font-bold text-gray-900 mb-6 flex items-center gap-3">
                  <span>{'\u2705'}</span> Knowledge Check: Test Your Understanding
                </h2>

                <div className="space-y-6 mb-8">
                  {quizQuestions.map((q, idx) => (
                    <div key={q.id} className="border-2 border-gray-200 rounded-lg p-6">
                      <h3 className="font-bold text-gray-900 mb-4">{idx + 1}. {q.question}</h3>
                      <div className="space-y-2">
                        {q.options.map((option, i) => {
                          const isSelected = quizAnswers[q.id] === option;
                          const isCorrect = option === q.correct;
                          const showResult = showQuizResults;
                          return (
                            <button key={i} onClick={() => !showQuizResults && handleQuizAnswer(q.id, option)} disabled={showQuizResults}
                              className={'w-full text-left p-4 rounded-lg border-2 transition-all ' + (
                                showResult && isCorrect ? 'border-green-500 bg-green-50'
                                : showResult && isSelected && !isCorrect ? 'border-red-500 bg-red-50'
                                : isSelected ? 'border-blue-500 bg-blue-50'
                                : 'border-gray-200 bg-white hover:border-blue-300'
                              ) + (showQuizResults ? ' cursor-not-allowed' : ' cursor-pointer')}>
                              <div className="flex items-center justify-between">
                                <span className="text-gray-700">{option}</span>
                                {showResult && isCorrect && <span className="text-green-600">{'\u2705'}</span>}
                                {showResult && isSelected && !isCorrect && <span className="text-red-600">{'\u274C'}</span>}
                              </div>
                            </button>
                          );
                        })}
                      </div>
                    </div>
                  ))}
                </div>

                {!showQuizResults ? (
                  <button onClick={submitQuiz} disabled={Object.keys(quizAnswers).length < quizQuestions.length}
                    className="w-full bg-gradient-to-r from-blue-500 to-indigo-600 text-white py-4 rounded-lg font-bold text-lg disabled:opacity-50 disabled:cursor-not-allowed hover:from-blue-600 hover:to-indigo-700 transition-all">
                    Submit Quiz
                  </button>
                ) : (
                  <div className="bg-gradient-to-r from-blue-50 to-indigo-50 border-2 border-blue-200 rounded-xl p-8">
                    <h3 className="text-2xl font-bold text-gray-900 mb-4">Quiz Results</h3>
                    <div className="text-center">
                      <div className="text-6xl font-bold text-blue-600 mb-2">{getQuizScore()} / {quizQuestions.length}</div>
                      <p className="text-gray-600 text-lg mb-4">
                        {getQuizScore() === quizQuestions.length
                          ? "Perfect score! \u{1F389} You've mastered the fundamentals!"
                          : getQuizScore() >= quizQuestions.length * 0.8
                          ? "Great job! \u{1F44F} You have a strong understanding!"
                          : getQuizScore() >= quizQuestions.length * 0.6
                          ? "Good effort! \u{1F4DA} Review the material to improve."
                          : "Keep learning! \u{1F4AA} Review the content and try again."}
                      </p>
                      <button onClick={() => { setQuizAnswers({}); setShowQuizResults(false); }}
                        className="bg-blue-500 text-white px-8 py-3 rounded-lg font-semibold hover:bg-blue-600 transition-all">
                        Retake Quiz
                      </button>
                    </div>
                  </div>
                )}
              </div>
            )}

            {/* Footer */}
            <div className="mt-8 bg-gradient-to-r from-blue-500 to-indigo-600 rounded-xl shadow-lg p-6 md:p-8 text-white">
              <h3 className="text-2xl font-bold mb-4">Ready to Apply Your Knowledge?</h3>
              <p className="mb-6 opacity-90">
                Now that you understand the fundamentals, you're ready to start your data science and machine learning journey.
                Practice with real datasets, experiment with different algorithms, and always keep learning!
              </p>
              <div className="grid md:grid-cols-3 gap-4">
                <div className="bg-white bg-opacity-20 rounded-lg p-4">
                  <h4 className="font-bold mb-2">Next Steps</h4>
                  <p className="text-sm opacity-90">Start with simple projects, gradually increasing complexity</p>
                </div>
                <div className="bg-white bg-opacity-20 rounded-lg p-4">
                  <h4 className="font-bold mb-2">Best Practices</h4>
                  <p className="text-sm opacity-90">Always validate your models, monitor for bias, and document your work</p>
                </div>
                <div className="bg-white bg-opacity-20 rounded-lg p-4">
                  <h4 className="font-bold mb-2">Keep Learning</h4>
                  <p className="text-sm opacity-90">ML evolves rapidly - stay updated with latest research and techniques</p>
                </div>
              </div>
            </div>

            <div className="mt-4 text-center text-gray-400 text-sm">
              <p>CMPSC 348 - Data Science &amp; Machine Learning | Penn State University</p>
            </div>
          </div>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(IntroDataScienceML));
  </script>
</body>
</html>
