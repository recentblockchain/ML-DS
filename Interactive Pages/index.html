<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feature Engineering Interactive Learning Tool</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
                'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue',
                sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            background-color: #f5f5f5;
        }
        #root {
            min-height: 100vh;
        }
    </style>
</head>
<body>
    <div id="root">Loading...</div>
    <script type="text/babel" data-type="module">
        // Inline the component to avoid CORS issues
        const { useState, useEffect } = React;
        const { LineChart, Line, BarChart, Bar, ScatterChart, Scatter, XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer, RadarChart, PolarGrid, PolarAngleAxis, PolarRadiusAxis, Radar } = window.Recharts || {};
        
        // Check if Recharts loaded
        if (!window.Recharts) {
            document.getElementById('root').innerHTML = '<div style="padding: 20px; text-align: center;"><h2>Loading Recharts...</h2><p>Please wait while the charts library loads...</p></div>';
            
            // Load Recharts dynamically
            const script = document.createElement('script');
            script.src = 'https://unpkg.com/recharts@2.5.0/dist/Recharts.js';
            script.onload = () => {
                window.location.reload();
            };
            document.head.appendChild(script);
        } else {
            // Load the JSX file
            fetch('feature_engineering_interactive.jsx')
                .then(response => response.text())
                .then(jsxCode => {
                    // Remove the import statement and export statement
                    jsxCode = jsxCode.replace(/^import.*from.*;\s*/gm, '');
                    jsxCode = jsxCode.replace(/export default.*;\s*$/, '');
                    
                    // Execute the code
                    eval(Babel.transform(jsxCode, { presets: ['react'] }).code);
                    
                    // Render the component
                    const root = ReactDOM.createRoot(document.getElementById('root'));
                    root.render(React.createElement(FeatureEngineeringLearningTool));
                })
                .catch(error => {
                    document.getElementById('root').innerHTML = `<div style="padding: 20px; color: red;"><h2>Error loading component</h2><pre>${error.message}</pre></div>`;
                    console.error('Error:', error);
                });
        }
    </script>
    <script src="https://unpkg.com/recharts@2.5.0/dist/Recharts.js"></script>
</body>
</html>
