                      {/* Visual Representation */}
                      <div className="bg-gradient-to-r from-blue-100 to-purple-100 rounded-lg p-6 mb-6">

                      <h2 className="text-3xl font-bold text-indigo-900 mb-4">CNN Architecture Overview</h2>
                      
                      {/* Architecture Visualization */}
                      <div className="bg-gradient-to-r from-indigo-100 to-purple-100 rounded-lg p-6 mb-6 overflow-x-auto">
                        <h3 className="text-xl font-semibold text-gray-800 mb-4">Typical CNN Pipeline</h3>
                        <div className="flex items-center gap-4 min-w-max pb-4">
                          <div className="text-center">
                            <div className="w-32 h-32 bg-gradient-to-br from-gray-400 to-gray-600 rounded-lg flex items-center justify-center text-white font-bold mb-2 text-sm">
                              INPUT<br/>IMAGE<br/>28×28×3
                            </div>
                            <p className="text-sm text-gray-700">RGB Image</p>
                          </div>

                              CONV<br/>26×26×32
                            </div>
                            <p className="text-sm text-gray-700">Feature Maps</p>
                          </div>
                          
                          <div className="text-2xl text-indigo-600">→</div>

                            <p className="text-sm text-gray-700">Downsampled</p>
                          </div>

                        {expandedCode['arch'] && (
                          <pre className="bg-gray-900 text-gray-100 rounded-lg p-6 overflow-x-auto text-sm">
{`import torch
import torch.nn as nn
import torch.nn.functional as F

class SimpleCNN(nn.Module):
    def __init__(self):
        super(SimpleCNN, self).__init__()
        
        # Convolutional Layer 1
        self.conv1 = nn.Conv2d(1, 32, kernel_size=3)
        # Convolutional Layer 2
        self.conv2 = nn.Conv2d(32, 64, kernel_size=3)
        # Max Pooling Layer
        self.pool = nn.MaxPool2d(kernel_size=2, stride=2)
        # Fully Connected Layers
        self.fc1 = nn.Linear(64 * 5 * 5, 128)
        self.fc2 = nn.Linear(128, 10)
        self.dropout = nn.Dropout(0.25)
    
    def forward(self, x):
        x = self.pool(F.relu(self.conv1(x)))
        x = self.pool(F.relu(self.conv2(x)))
        x = x.view(-1, 64 * 5 * 5)
        x = self.dropout(F.relu(self.fc1(x)))
        x = self.fc2(x)
        return x

model = SimpleCNN()
print(model)`}

                      {/* Convolution Operation Visualization */}
                      <div className="bg-gradient-to-r from-blue-100 to-cyan-100 rounded-lg p-6 mb-6">

                              ))}
                            </div>
                          </div>

                            <div className="grid grid-cols-3 gap-1 mx-auto w-fit">
                              {[1,0,-1,1,0,-1,1,0,-1].map((val, i) => (
                                <div key={i} className={`w-10 h-10 flex items-center justify-center text-xs font-semibold rounded ${val > 0 ? 'bg-green-500 text-white' : val < 0 ? 'bg-red-500 text-white' : 'bg-gray-300'}`}>
                                  {val}
                                </div>
                              ))}
                            </div>
                          </div>

                          <div className="bg-white rounded-lg p-4">
                            <h4 className="font-semibold text-indigo-700 mb-3">3️⃣ Output (3×3)</h4>
                            <div className="grid grid-cols-3 gap-1 mx-auto w-fit">
                              {[2,-1,2,-1,0,-1,2,-1,2].map((val, i) => (
                                <div key={i} className={`w-10 h-10 flex items-center justify-center text-xs font-semibold rounded ${Math.abs(val) > 1 ? 'bg-yellow-500 text-white' : 'bg-yellow-200'}`}>
                                  {val}
                                </div>
                              ))}
                            </div>
                          </div>
                        </div>
                      </div>

                      {/* Output Size Formula */}
                      <div className="bg-yellow-50 rounded-lg p-6">
                        <h3 className="text-xl font-semibold text-gray-800 mb-3">Output Dimension Formula</h3>
                        <div className="bg-white rounded-lg p-4">
                          <p className="text-lg font-mono text-center text-gray-800 mb-4">
                            Output Size = ⌊(Input - Kernel + 2×Padding) / Stride⌋ + 1
                          </p>
                          <div className="space-y-2">
                            <div className="bg-blue-50 rounded p-3">
                              <p className="text-sm font-semibold">Example: 28×28 input, 3×3 kernel, stride 1, padding 0</p>
                              <p className="text-sm font-mono text-indigo-600">Output: ⌊(28-3+0)/1⌋+1 = 26×26</p>
                            </div>
                          </div>
                        </div>
                      </div>
                    </div>
                  </div>
                )}

                {/* Section 3: Pooling Layer */}
                {activeSection === 3 && (
                  <div className="space-y-6">
                    <div className="bg-white rounded-lg shadow-lg p-8">

                      <div className="bg-gradient-to-r from-purple-100 to-pink-100 rounded-lg p-6 mb-6">

                        <div className="grid md:grid-cols-2 gap-6">

                            <span className="text-purple-600 font-bold">•</span>

{`import torch
import torch.nn as nn
import torch.optim as optim
from torchvision import datasets, transforms

# Define CNN Model
class MNISTNet(nn.Module):
    def __init__(self):
        super(MNISTNet, self).__init__()
        self.conv1 = nn.Conv2d(1, 32, 3, 1)
        self.conv2 = nn.Conv2d(32, 64, 3, 1)
        self.fc1 = nn.Linear(9216, 128)
        self.fc2 = nn.Linear(128, 10)
        self.pool = nn.MaxPool2d(2)
        self.dropout = nn.Dropout(0.25)
    
    def forward(self, x):
        x = torch.relu(self.conv1(x))
        x = self.pool(torch.relu(self.conv2(x)))
        x = torch.flatten(x, 1)
        x = torch.relu(self.fc1(x))
        x = self.dropout(x)
        x = self.fc2(x)
        return x

# Training setup
model = MNISTNet()
optimizer = optim.Adam(model.parameters(), lr=0.001)
criterion = nn.CrossEntropyLoss()

# Load MNIST data
transform = transforms.Compose([
    transforms.ToTensor(),
    transforms.Normalize((0.1307,), (0.3081,))
])

train_dataset = datasets.MNIST('./data', train=True, 
                              download=True, transform=transform)
train_loader = torch.utils.data.DataLoader(train_dataset, 
                                          batch_size=64, shuffle=True)

# Training loop
model.train()
for epoch in range(5):
    for batch_idx, (data, target) in enumerate(train_loader):
        optimizer.zero_grad()
        output = model(data)
        loss = criterion(output, target)
        loss.backward()
        optimizer.step()
        
        if batch_idx % 100 == 0:
            print(f'Epoch: {epoch}, Loss: {loss.item():.4f}')

print("Training complete!")`}
