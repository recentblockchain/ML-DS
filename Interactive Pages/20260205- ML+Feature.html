from sklearn.datasets import make_regression

# Generate data
X, y = make_regression(n_samples=200, n_features=10, noise=0.1, random_state=42)
X_train, X_test, y_train, y_test = train_test_split(X, y, test_size=0.3)

# Cost complexity pruning

path = dt_reg.cost_complexity_pruning_path(X_train, y_train)

# Find best alpha
train_scores, test_scores = [], []

    dt.fit(X_train, y_train)
    train_scores.append(dt.score(X_train, y_train))

from sklearn.svm import SVR

from sklearn.model_selection import GridSearchCV

X_train, X_test, y_train, y_test = train_test_split(X, y, test_size=0.3)

X_train_scaled = scaler_X.fit_transform(X_train)

                            blue: '#2563eb',

                            purple: '#9333ea',
                            orange: '#ea580c',
                            red: '#dc2626'
                          }[model.color]
                        } : {}}
                      >
                        {model.icon}
                        <span className="text-center text-sm">{model.name}</span>
                      </button>
                    ))}
                  </div>
                </div>

                {/* Section Navigation */}
                <div className="bg-white rounded-lg shadow-lg p-6 mb-8">
                  <div className="flex flex-wrap gap-3">
                    {sections.map((section) => (
                      <button
                        key={section.id}
                        onClick={() => setActiveSection(section.id)}
                        className={`flex items-center gap-2 px-4 py-3 rounded-lg transition-all ${
                          activeSection === section.id
                            ? 'text-white shadow-md'
                            : 'bg-gray-100 text-gray-700 hover:bg-gray-200'
                        }`}
                        style={activeSection === section.id ? {
                          backgroundColor: {
                            blue: '#2563eb',
                            green: '#16a34a',
                            purple: '#9333ea',
                            orange: '#ea580c',
                            red: '#dc2626'
                          }[currentModel.color]
                        } : {}}
                      >
                        {section.icon}
                        <span className="font-medium">{section.title}</span>
                      </button>
                    ))}
                  </div>
                </div>

                {/* Content Section */}
                <div className="bg-white rounded-lg shadow-lg p-8">
                  {activeSection === 0 && (
                    <div>
                      <h2 className="text-3xl font-bold mb-4" style={{ color: {
                        blue: '#2563eb',
                        green: '#16a34a',
                        purple: '#9333ea',
                        orange: '#ea580c',
                        red: '#dc2626'
                      }[currentModel.color] }}>{content.overview.title}</h2>
                      <p className="text-gray-700 text-lg mb-6">{content.overview.description}</p>
                      <h3 className="text-xl font-semibold mb-3">Key Points:</h3>
                      <ul className="space-y-2">
                        {content.overview.keyPoints.map((point, idx) => (
                          <li key={idx} className="flex items-start gap-2">
                            <span className="text-green-600 mt-1">✓</span>
                            <span className="text-gray-700">{point}</span>
                          </li>
                        ))}
                      </ul>
                    </div>
                  )}

                  {activeSection === 1 && (
                    <div>
                      <h2 className="text-3xl font-bold mb-6" style={{ color: {
                        blue: '#2563eb',
                        green: '#16a34a',
                        purple: '#9333ea',
                        orange: '#ea580c',
                        red: '#dc2626'
                      }[currentModel.color] }}>Key Features & Parameters</h2>
                      <div className="grid gap-4">
                        {content.features.map((feature, idx) => (
                          <div key={idx} className="border-l-4 pl-4 py-2" style={{ borderColor: {
                            blue: '#2563eb',
                            green: '#16a34a',
                            purple: '#9333ea',
                            orange: '#ea580c',
                            red: '#dc2626'
                          }[currentModel.color] }}>
                            <h3 className="text-lg font-semibold text-gray-800">{feature.name}</h3>
                            <p className="text-gray-600">{feature.desc}</p>
                          </div>
                        ))}
                      </div>
                    </div>
                  )}

                  {activeSection === 2 && (
                    <div>
                      <h2 className="text-3xl font-bold mb-4" style={{ color: {
                        blue: '#2563eb',
                        green: '#16a34a',
                        purple: '#9333ea',
                        orange: '#ea580c',
                        red: '#dc2626'
                      }[currentModel.color] }}>Basic Implementation</h2>
                      <div className="bg-gray-900 text-gray-100 p-6 rounded-lg overflow-x-auto">
                        <pre className="text-sm"><code>{content.code1}</code></pre>
                      </div>
                    </div>
                  )}

                  {activeSection === 3 && (
                    <div>
                      <h2 className="text-3xl font-bold mb-4" style={{ color: {
                        blue: '#2563eb',
                        green: '#16a34a',
                        purple: '#9333ea',
                        orange: '#ea580c',
                        red: '#dc2626'
                      }[currentModel.color] }}>Advanced Features</h2>
                      <div className="bg-gray-900 text-gray-100 p-6 rounded-lg overflow-x-auto">
                        <pre className="text-sm"><code>{content.code2}</code></pre>
                      </div>
                    </div>
                  )}

                  {activeSection === 4 && (
                    <div>
                      <h2 className="text-3xl font-bold mb-4" style={{ color: {
                        blue: '#2563eb',
                        green: '#16a34a',
                        purple: '#9333ea',
                        orange: '#ea580c',
                        red: '#dc2626'
                      }[currentModel.color] }}>Hyperparameter Tuning</h2>
                      <div className="bg-gray-900 text-gray-100 p-6 rounded-lg overflow-x-auto">
                        <pre className="text-sm"><code>{content.code3}</code></pre>
                      </div>
                    </div>
                  )}
                </div>

                {/* Footer */}
                <div className="bg-white rounded-lg shadow-lg p-6 mt-8 text-center">
                  <p className="text-gray-600 font-semibold text-lg mb-2">
                    🎓 Complete Machine Learning Models Guide
                  </p>
                  <p className="text-sm text-gray-500 mb-3">
                    Master Decision Trees, Ensembles, Boosting, and SVMs with practical implementations
                  </p>
                  <div className="flex justify-center gap-6 text-xs text-gray-500 flex-wrap">
                    <span>📊 Feature Engineering</span>
                    <span>•</span>
                    <span>💻 3 Code Examples per Model</span>
                    <span>•</span>
                    <span>🎯 Production-Ready</span>
                    <span>•</span>
                    <span>🚀 Scikit-learn</span>
                  </div>
                </div>
              </div>
            </div>
          );
        };

        // Render the app
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<MLModelsGuide />);
    </script>
</body>
</html>
